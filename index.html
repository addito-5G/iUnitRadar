<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>iUnitRadar — B2B SaaS Unit Economics</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{background:linear-gradient(135deg,#1e3a5f,#0f172a);padding:24px 32px;border-bottom:1px solid #1e40af}
.header h1{font-size:1.6rem;color:#60a5fa;letter-spacing:.5px}  
.header p{color:#94a3b8;font-size:.9rem;margin-top:4px}
.container{max-width:1100px;margin:0 auto;padding:24px 16px}
.scenarios{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.btn{padding:8px 20px;border-radius:8px;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer;font-size:.85rem;transition:all .2s}
.btn.active{background:#1e40af;color:#fff;border-color:#3b82f6}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-bottom:24px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px}
.card h3{color:#60a5fa;font-size:.95rem;margin-bottom:16px;text-transform:uppercase;letter-spacing:.5px}
.field{margin-bottom:14px}
.field label{display:block;color:#94a3b8;font-size:.8rem;margin-bottom:4px}
.field input{width:100%;padding:8px 10px;background:#0f172a;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:.9rem;outline:none}
.field input:focus{border-color:#3b82f6}
.results{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.metric{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:16px;text-align:center}
.metric .val{font-size:1.5rem;font-weight:700;color:#34d399}
.metric .val.warn{color:#fbbf24}
.metric .val.bad{color:#f87171}
.metric .lbl{font-size:.75rem;color:#64748b;margin-top:4px}
.health{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;margin-bottom:24px}
.health h3{color:#60a5fa;margin-bottom:12px;font-size:.95rem}
.bar-wrap{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.bar-lbl{width:120px;font-size:.8rem;color:#94a3b8;text-align:right}
.bar-bg{flex:1;height:10px;background:#0f172a;border-radius:6px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transition:width .4s}
.bar-val{width:60px;font-size:.8rem;color:#e2e8f0}
.footer{text-align:center;padding:20px;color:#334155;font-size:.75rem}
</style>
</head>
<body>
<div class="header">
  <h1>iUnitRadar — Unit Economics B2B SaaS</h1>
  <p>CAC, Payback, LTV, Gross Margin, ROMI, NRR — три сценария</p>
</div>
<div class="container">
  <div class="scenarios">
    <button class="btn" id="btn-cons" onclick="setScenario('conservative')">Консервативный</button>
    <button class="btn active" id="btn-base" onclick="setScenario('base')">Базовый</button>
    <button class="btn" id="btn-aggr" onclick="setScenario('aggressive')">Агрессивный</button>
  </div>
  <div class="grid">
    <div class="card">
      <h3>Привлечение</h3>
      <div class="field"><label>Маркетинг-бюджет в месяц (₽)</label><input id="mkt" type="number" oninput="calc()"></div>
      <div class="field"><label>Новых клиентов в месяц</label><input id="new_clients" type="number" oninput="calc()"></div>
      <div class="field"><label>Зарплата продаж в месяц (₽)</label><input id="sales_salary" type="number" oninput="calc()"></div>
    </div>
    <div class="card">
      <h3>Доход</h3>
      <div class="field"><label>Средний чек (MRR на клиента, ₽)</label><input id="arpu" type="number" oninput="calc()"></div>
      <div class="field"><label>Gross Margin (%)</label><input id="gm" type="number" oninput="calc()"></div>
      <div class="field"><label>Expansion Revenue (%/мес)</label><input id="expansion" type="number" oninput="calc()"></div>
    </div>
    <div class="card">
      <h3>Удержание</h3>
      <div class="field"><label>Churn Rate (%/мес)</label><input id="churn" type="number" oninput="calc()"></div>
      <div class="field"><label>Срок жизни клиента (мес) — авто</label><input id="lt" type="number" readonly style="opacity:.6"></div>
      <div class="field"><label>Стоимость поддержки/клиент (₽/мес)</label><input id="support" type="number" oninput="calc()"></div>
    </div>
  </div>
  <div class="results" id="results"></div>
  <div class="health">
    <h3>Health Bars</h3>
    <div id="bars"></div>
  </div>
</div>
<div class="footer">iUnitRadar &copy; 2026 &mdash; сгенерировано Perplexity Computer</div>
<script>
const scenarios={
  conservative:{mkt:300000,new_clients:5,sales_salary:150000,arpu:25000,gm:60,expansion:1,churn:5,support:3000},
  base:{mkt:500000,new_clients:10,sales_salary:200000,arpu:40000,gm:70,expansion:2,churn:3,support:2000},
  aggressive:{mkt:1000000,new_clients:25,sales_salary:350000,arpu:60000,gm:75,expansion:4,churn:2,support:1500}
};
function setScenario(s){
  const d=scenarios[s];
  document.getElementById('mkt').value=d.mkt;
  document.getElementById('new_clients').value=d.new_clients;
  document.getElementById('sales_salary').value=d.sales_salary;
  document.getElementById('arpu').value=d.arpu;
  document.getElementById('gm').value=d.gm;
  document.getElementById('expansion').value=d.expansion;
  document.getElementById('churn').value=d.churn;
  document.getElementById('support').value=d.support;
  ['cons','base','aggr'].forEach(b=>document.getElementById('btn-'+b).classList.remove('active'));
  const map={conservative:'cons',base:'base',aggressive:'aggr'};
  document.getElementById('btn-'+map[s]).classList.add('active');
  calc();
}
function v(id){return parseFloat(document.getElementById(id).value)||0;}
function fmt(n){return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(0)+'K':n.toFixed(0);}
function fmtR(n){return n.toFixed(1);}
function color(val,good,ok){
  if(val>=good)return '';
  if(val>=ok)return 'warn';
  return 'bad';
}
function calc(){
  const mkt=v('mkt'),nc=v('new_clients'),ss=v('sales_salary'),arpu=v('arpu'),gm=v('gm'),exp=v('expansion'),churn=v('churn'),sup=v('support');
  const cac=nc>0?(mkt+ss)/nc:0;
  const lt=churn>0?100/churn:0;
  document.getElementById('lt').value=lt.toFixed(1);
  const netChurn=churn-exp;
  const ltv_base=arpu*(gm/100)*lt;
  const ltv=ltv_base-(sup*lt);
  const ltv_cac=cac>0?ltv/cac:0;
  const payback=arpu*(gm/100)>0?cac/(arpu*(gm/100)):0;
  const nrr=100-churn+exp;
  const romi=cac>0?((ltv-cac)/cac)*100:0;
  const marginPerClient=arpu*(gm/100)-sup;
  const res=[
    {lbl:'CAC',val:'₽'+fmt(cac),raw:cac,cls:color(ltv_cac,3,1.5)},
    {lbl:'LTV',val:'₽'+fmt(ltv),raw:ltv,cls:''},
    {lbl:'LTV/CAC',val:fmtR(ltv_cac)+'x',raw:ltv_cac,cls:color(ltv_cac,3,1.5)},
    {lbl:'Payback (мес)',val:fmtR(payback),raw:payback,cls:color(36-payback,24,12)},
    {lbl:'NRR',val:fmtR(nrr)+'%',raw:nrr,cls:color(nrr,110,100)},
    {lbl:'ROMI',val:fmtR(romi)+'%',raw:romi,cls:color(romi,200,100)},
    {lbl:'Gross Margin',val:gm+'%',raw:gm,cls:color(gm,70,50)},
    {lbl:'Маржа/клиент',val:'₽'+fmt(marginPerClient),raw:marginPerClient,cls:''}
  ];
  document.getElementById('results').innerHTML=res.map(r=>
    `<div class="metric"><div class="val ${r.cls}">${r.val}</div><div class="lbl">${r.lbl}</div></div>`
  ).join('');
  const bars=[
    {lbl:'LTV/CAC',val:ltv_cac,max:5,good:3,ok:1.5},
    {lbl:'NRR',val:nrr,max:130,good:110,ok:100},
    {lbl:'Gross Margin',val:gm,max:100,good:70,ok:50},
    {lbl:'ROMI',val:romi,max:400,good:200,ok:100}
  ];
  document.getElementById('bars').innerHTML=bars.map(b=>{
    const pct=Math.min(100,Math.max(0,(b.val/b.max)*100));
    const c=b.val>=b.good?'#34d399':b.val>=b.ok?'#fbbf24':'#f87171';
    return `<div class="bar-wrap"><div class="bar-lbl">${b.lbl}</div><div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${c}"></div></div><div class="bar-val">${fmtR(b.val)}</div></div>`;
  }).join('');
}
setScenario('base');
</script>
</body>
</html>
